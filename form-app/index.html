<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stingray Order Form</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">2027 Corvette</p>
          <h1>Stingray Order Form</h1>
        </div>
        <div class="toolbar">
          <button id="resetButton" type="button" class="ghost-button">Reset</button>
          <button id="exportJsonButton" type="button">Export JSON</button>
          <button id="exportCsvButton" type="button">Export CSV</button>
        </div>
      </header>

      <section class="vehicle-bar" aria-label="Vehicle context">
        <div class="vehicle-context-item">
          <span>Body Style</span>
          <strong id="currentBody">Coupe</strong>
        </div>
        <div class="vehicle-context-item">
          <span>Trim Level</span>
          <strong id="currentTrim">1LT</strong>
        </div>
        <div class="vehicle-price">
          <span>Base MSRP</span>
          <strong id="basePrice">$0</strong>
        </div>
      </section>

      <section id="alertRegion" class="alert-region" aria-live="polite"></section>

      <div class="workspace">
        <nav class="step-rail" aria-label="Form steps">
          <div id="stepRail"></div>
        </nav>
        <section class="choice-panel" aria-label="Current choices">
          <div id="stepContent"></div>
        </section>
        <aside class="summary-panel" aria-label="Order summary">
          <div class="summary-card">
            <p class="eyebrow">Summary</p>
            <h2 id="variantName">Stingray</h2>
            <dl class="total-list">
              <div><dt>Base</dt><dd id="summaryBase">$0</dd></div>
              <div><dt>Options</dt><dd id="summaryOptions">$0</dd></div>
              <div><dt>Total MSRP</dt><dd id="summaryTotal">$0</dd></div>
            </dl>
          </div>
          <div class="summary-card">
            <h3>Selected RPOs</h3>
            <ul id="selectedList" class="summary-list"></ul>
            <div id="selectedStandardEquipmentList" class="standard-equipment-list compact-standard-equipment"></div>
          </div>
          <div class="summary-card">
            <h3>Auto-added RPOs</h3>
            <ul id="autoList" class="summary-list"></ul>
          </div>
          <div class="summary-card">
            <h3>Open Requirements</h3>
            <ul id="missingList" class="summary-list"></ul>
          </div>
          <div class="summary-card standard-card">
            <h3>Standard & Included</h3>
            <div id="standardEquipmentList" class="standard-equipment-list"></div>
          </div>
        </aside>
      </div>
    </main>

    <script src="./data.js?v=4"></script>
    <script src="./app.js?v=4"></script>
  </body>
</html>
